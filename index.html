<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Form Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Credit Card Payment Form</h1>
<main>
<section class="cart">
<h2>Your Cart</h2>
<div class="product">
  <img src="https://plus.unsplash.com/premium_photo-1677838847721-2bf14b48c256?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Credit Card">
  <div class="product-info">
    <p>Headphones</p>
    <p>$89</p>
    <p>Quantity: 1</p>
  </div>
</div>
</section>
<section>
<h2>Payment Information</h2>
<form>
  <label for="card-name">Full Name</label>
  <input id="card-name" name="card-name" type="text" placeholder="Andrii Kuleshov" required>

  <label for="card-number">Card Number</label>
  <input id="card-number" name="card-number" type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>

  <div class="card-extra">
  <div>
    <label for="expiry">Expiry Date</label>
    <input id="expiry" type="text" placeholder="MM/YY" required>
  </div>
  <div>
    <label for="cvv">CVV</label>
    <input id="cvv" type="text" placeholder="123" maxlength="3" required>  </div>
</div>
<p>Enter a 16-digit card number without spaces.</p>
<button type="submit">Pay Now</button>
</form>
</section>
<p><a href="https://andrii-kuleshov.github.io/portfolio/">
  ← Back to Portfolio</a></p>
</main>
<script src="script.js"></script>
</body>
</html>
