<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Form Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Credit Card Payment Form</h1>
<main>
<section class="cart">
<h2>Your Cart</h2>
<div id="order-summary"></div>
<p id="checkout-total">Total: $0</p>
</section>
<section>
<h2>Payment Information</h2>
<form id="payment-form">
  <label for="card-name">Full Name</label>
  <input id="card-name" name="card-name" type="text" placeholder="Andrii Kuleshov" required>

  <label for="card-number">Card Number</label>
  <input id="card-number" name="card-number" type="text" placeholder="1234 5678 9012 3456" maxlength="19" required>

  <div class="card-extra">
  <div>
    <label for="expiry">Expiry Date</label>
    <input id="expiry" type="text" placeholder="MM/YY" required>
  </div>
  <div>
    <label for="cvv">CVV</label>
    <input id="cvv" type="text" placeholder="123" maxlength="3" inputmode="numeric" pattern="[0-9]*" required>
  </div>
</div>
<p>Enter a 16-digit card number without spaces.</p>
<button id="pay-btn" type="submit">Pay Now</button>
</form>
<button id="back-btn">Back To Store</button>
</section>
<p><a href="https://andrii-kuleshov.github.io/portfolio/">
  ← Back to Portfolio</a></p>
<div id="thank-you" class="hidden">
  <h2>Thank you for your purchase!</h2>
  <p>Your payment was successful.</p>
  <button id="continue-btn">Back to Store</button>
</div>
</main>
<script src="script.js"></script>
</body>
</html>
